<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit PDF - PDF Master Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{background:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #e0e0e0;flex-shrink:0;z-index:50}
.logo{font-size:18px;font-weight:700;color:#d32f2f;display:flex;align-items:center;gap:8px}
.hbtns{display:flex;gap:8px}
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn-red{background:#d32f2f;color:#fff}.btn-red:hover{background:#b71c1c}
.btn-gray{background:#f0f0f0;color:#333;border:1px solid #ddd}.btn-gray:hover{background:#e0e0e0}

/* TOOLBAR */
#toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 16px;display:none;gap:6px;align-items:center;flex-wrap:wrap;flex-shrink:0}
#toolbar.show{display:flex}
.tbtn{padding:7px 14px;border:1px solid #ddd;border-radius:5px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px;transition:all .2s}
.tbtn:hover{border-color:#d32f2f;background:#fff5f5}
.tbtn.active{background:#d32f2f;color:#fff;border-color:#d32f2f}
.tsep{width:1px;height:28px;background:#e0e0e0;margin:0 4px}
select.tsel{padding:6px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;cursor:pointer;background:#fff}
input[type=color].tcol{width:32px;height:32px;border:1px solid #ddd;border-radius:5px;cursor:pointer;padding:2px}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex}

/* UPLOAD */
#uploadArea{flex:1;display:flex;align-items:center;justify-content:center}
.upload-box{background:#fff;border:3px dashed #ccc;border-radius:16px;padding:60px 50px;text-align:center;cursor:pointer;transition:all .3s;max-width:480px}
.upload-box:hover{border-color:#d32f2f;background:#fff5f5}
.upload-box i{font-size:60px;color:#d32f2f;margin-bottom:16px;display:block}
.upload-box h2{font-size:22px;color:#333;margin-bottom:8px}
.upload-box p{color:#888;font-size:14px;margin-bottom:20px}
.upload-box input{display:none}

/* EDITOR */
#editorArea{flex:1;display:none;overflow:auto;padding:30px;align-items:flex-start;justify-content:center}
#editorArea.show{display:flex}

/* PAGE CONTAINER */
#pageWrap{position:relative;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.15);background:#fff;cursor:text}
#pdfCanvas{display:block}

/* TEXT OVERLAY LAYER */
#textLayer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.txt-span{position:absolute;cursor:text;color:transparent;white-space:pre;pointer-events:all;border-radius:2px;transition:background .15s}
.txt-span:hover{background:rgba(66,133,244,.15);outline:1px solid rgba(66,133,244,.4)}
.txt-span.editing{background:rgba(255,255,255,.95);color:#000;outline:2px solid #d32f2f;z-index:10;min-width:20px}

/* INLINE EDITOR */
#inlineEditor{position:absolute;display:none;z-index:20;background:#fff;border:2px solid #d32f2f;border-radius:6px;box-shadow:0 4px 16px rgba(0,0,0,.2);padding:8px;min-width:200px}
#inlineEditor.show{display:block}
#inlineInput{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:14px;outline:none;margin-bottom:6px}
.ie-btns{display:flex;gap:6px}
.ie-btn{flex:1;padding:5px;border:none;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600}
.ie-ok{background:#d32f2f;color:#fff}
.ie-cancel{background:#f0f0f0;color:#333}

/* ADD TEXT CURSOR */
#pageWrap.add-text-mode{cursor:crosshair}

/* BOTTOM BAR */
#bottomBar{background:#fff;border-top:1px solid #e0e0e0;padding:10px 20px;display:none;justify-content:space-between;align-items:center;flex-shrink:0}
#bottomBar.show{display:flex}
.page-nav{display:flex;align-items:center;gap:10px;font-size:14px}
.nav-btn{width:30px;height:30px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#f5f5f5}
.zoom-ctrl{display:flex;align-items:center;gap:8px;font-size:14px}

/* MODAL */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.mbox{background:#fff;border-radius:12px;padding:36px;text-align:center;max-width:380px}
.mbox i{font-size:48px;margin-bottom:12px;display:block}
.spin{animation:spin 1s linear infinite;color:#d32f2f}
.ok{color:#4caf50}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><i class="fas fa-file-pdf"></i> PDF Master Pro — Edit PDF</div>
  <div class="hbtns">
    <button class="btn btn-gray" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</button>
    <button class="btn btn-red" id="applyBtn" style="display:none" onclick="applyChanges()"><i class="fas fa-download"></i> Apply & Download</button>
  </div>
</div>

<div id="toolbar">
  <button class="tbtn active" id="tbtn-select" onclick="setMode('select')"><i class="fas fa-mouse-pointer"></i> Select & Edit</button>
  <button class="tbtn" id="tbtn-addtext" onclick="setMode('addtext')"><i class="fas fa-plus"></i> Add Text</button>
  <div class="tsep"></div>
  <select class="tsel" id="fontFamily">
    <option>Helvetica</option><option>Times-Roman</option><option>Courier</option>
  </select>
  <select class="tsel" id="fontSize">
    <option value="10">10</option><option value="12">12</option><option value="14" selected>14</option>
    <option value="16">16</option><option value="18">18</option><option value="24">24</option>
    <option value="32">32</option><option value="48">48</option>
  </select>
  <input type="color" class="tcol" id="fontColor" value="#000000" title="Text color">
  <div class="tsep"></div>
  <button class="tbtn" onclick="undoLast()"><i class="fas fa-undo"></i> Undo</button>
</div>

<div class="main">
  <div id="uploadArea">
    <div class="upload-box" onclick="document.getElementById('fileInput').click()">
      <i class="fas fa-file-pdf"></i>
      <h2>Open PDF to Edit</h2>
      <p>Click to select a PDF file from your computer</p>
      <button class="btn btn-red" onclick="event.stopPropagation();document.getElementById('fileInput').click()">
        <i class="fas fa-folder-open"></i> Browse PDF
      </button>
      <input type="file" id="fileInput" accept=".pdf">
    </div>
  </div>

  <div id="editorArea">
    <div id="pageWrap">
      <canvas id="pdfCanvas"></canvas>
      <div id="textLayer"></div>
      <div id="inlineEditor">
        <input type="text" id="inlineInput" placeholder="Edit text...">
        <div class="ie-btns">
          <button class="ie-btn ie-ok" onclick="confirmEdit()">✓ OK</button>
          <button class="ie-btn ie-cancel" onclick="cancelEdit()">✕ Cancel</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="bottomBar">
  <div class="page-nav">
    <button class="nav-btn" onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
    <span>Page <strong id="pageNum">1</strong> of <strong id="totalPages">1</strong></span>
    <button class="nav-btn" onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
  </div>
  <div class="zoom-ctrl">
    <button class="nav-btn" onclick="changeZoom(-0.25)"><i class="fas fa-minus"></i></button>
    <span id="zoomLabel">100%</span>
    <button class="nav-btn" onclick="changeZoom(0.25)"><i class="fas fa-plus"></i></button>
  </div>
</div>

<div class="modal" id="loadModal">
  <div class="mbox"><i class="fas fa-spinner spin"></i><h3 id="loadMsg">Loading PDF...</h3></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc=null, pdfJsDoc=null, currentPage=1, scale=1.5, mode='select';
let originalBytes=null;
// edits: array of {page, x, y, text, origText, fontSize, color, fontName, isNew}
let edits=[];
let activeEdit=null; // {spanEl, itemIndex, page}

document.getElementById('fileInput').addEventListener('change', async e=>{
  const file=e.target.files[0];
  if(!file) return;
  showModal('Loading PDF...');
  const buf=await file.arrayBuffer();
  originalBytes=buf.slice(0);
  pdfJsDoc=await pdfjsLib.getDocument({data:new Uint8Array(originalBytes)}).promise;
  document.getElementById('uploadArea').style.display='none';
  document.getElementById('editorArea').classList.add('show');
  document.getElementById('toolbar').classList.add('show');
  document.getElementById('bottomBar').classList.add('show');
  document.getElementById('applyBtn').style.display='';
  document.getElementById('totalPages').textContent=pdfJsDoc.numPages;
  await renderPage(1);
  hideModal();
});

async function renderPage(n){
  currentPage=n;
  document.getElementById('pageNum').textContent=n;
  const page=await pdfJsDoc.getPage(n);
  const vp=page.getViewport({scale});
  const canvas=document.getElementById('pdfCanvas');
  canvas.width=vp.width; canvas.height=vp.height;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  await buildTextLayer(page, vp);
}

async function buildTextLayer(page, vp){
  const layer=document.getElementById('textLayer');
  layer.innerHTML='';
  const content=await page.getTextContent();
  content.items.forEach((item,idx)=>{
    if(!item.str.trim()) return;
    const tx=item.transform;
    // PDF coords → canvas coords
    const x=tx[4]*scale;
    const y=vp.height - tx[5]*scale;
    const fs=Math.abs(tx[3])*scale; // font size in canvas px
    const w=item.width*scale;

    const span=document.createElement('span');
    span.className='txt-span';
    span.textContent=item.str;
    span.style.cssText=`left:${x}px;top:${y-fs}px;font-size:${fs}px;width:${Math.max(w,4)}px;height:${fs*1.2}px;line-height:${fs*1.2}px`;
    span.dataset.idx=idx;
    span.dataset.origText=item.str;
    span.dataset.x=tx[4]; // PDF coords
    span.dataset.y=tx[5];
    span.dataset.fs=Math.abs(tx[3]);
    span.dataset.fontName=item.fontName||'Helvetica';

    span.addEventListener('click', e=>{
      if(mode==='select') openEditPopup(span, e);
    });
    layer.appendChild(span);
  });

  // Re-apply existing edits for this page
  edits.filter(ed=>ed.page===currentPage).forEach(ed=>{
    if(!ed.isNew) return; // existing text edits shown via span
    addNewTextSpan(ed);
  });

  // Click on canvas to add text
  document.getElementById('pageWrap').onclick=e=>{
    if(mode==='addtext' && e.target===document.getElementById('pdfCanvas')){
      openAddTextPopup(e);
    }
  };
}

function openEditPopup(span, e){
  e.stopPropagation();
  cancelEdit();
  activeEdit={span, isNew:false};
  span.classList.add('editing');
  const ie=document.getElementById('inlineEditor');
  const input=document.getElementById('inlineInput');
  input.value=span.textContent;
  // Position popup near span
  const rect=span.getBoundingClientRect();
  const wrap=document.getElementById('pageWrap').getBoundingClientRect();
  let left=parseFloat(span.style.left);
  let top=parseFloat(span.style.top)+parseFloat(span.style.height||'20')+4;
  ie.style.left=left+'px';
  ie.style.top=top+'px';
  ie.classList.add('show');
  input.focus();
  input.select();
}

function openAddTextPopup(e){
  cancelEdit();
  const wrap=document.getElementById('pageWrap');
  const rect=wrap.getBoundingClientRect();
  const cx=e.clientX-rect.left;
  const cy=e.clientY-rect.top;
  // Convert to PDF coords
  const vp_height=document.getElementById('pdfCanvas').height;
  const pdfX=cx/scale;
  const pdfY=(vp_height-cy)/scale;

  activeEdit={isNew:true, pdfX, pdfY, canvasX:cx, canvasY:cy};
  const ie=document.getElementById('inlineEditor');
  const input=document.getElementById('inlineInput');
  input.value='';
  ie.style.left=cx+'px';
  ie.style.top=(cy+4)+'px';
  ie.classList.add('show');
  input.focus();
}

function confirmEdit(){
  const input=document.getElementById('inlineInput');
  const newText=input.value.trim();
  if(!newText){cancelEdit();return;}

  if(activeEdit && !activeEdit.isNew){
    // Edit existing text span
    const span=activeEdit.span;
    const origText=span.dataset.origText;
    if(newText!==origText){
      edits.push({
        page:currentPage,
        x:parseFloat(span.dataset.x),
        y:parseFloat(span.dataset.y),
        fs:parseFloat(span.dataset.fs),
        origText,
        newText,
        isNew:false
      });
      span.textContent=newText;
      span.dataset.origText=newText; // update so re-edit works
    }
    span.classList.remove('editing');
  } else if(activeEdit && activeEdit.isNew){
    const fs=parseInt(document.getElementById('fontSize').value)||14;
    const color=document.getElementById('fontColor').value;
    const fontName=document.getElementById('fontFamily').value;
    const ed={
      page:currentPage,
      x:activeEdit.pdfX,
      y:activeEdit.pdfY,
      fs,
      newText,
      color,
      fontName,
      isNew:true
    };
    edits.push(ed);
    addNewTextSpan(ed);
  }
  cancelEdit();
}

function addNewTextSpan(ed){
  const layer=document.getElementById('textLayer');
  const vp_height=document.getElementById('pdfCanvas').height;
  const cx=ed.x*scale;
  const cy=vp_height-ed.y*scale;
  const fs=ed.fs*scale;
  const span=document.createElement('span');
  span.className='txt-span';
  span.textContent=ed.newText;
  span.style.cssText=`left:${cx}px;top:${cy-fs}px;font-size:${fs}px;color:${ed.color||'#000'};min-width:20px;height:${fs*1.2}px;line-height:${fs*1.2}px`;
  span.dataset.origText=ed.newText;
  span.dataset.x=ed.x; span.dataset.y=ed.y; span.dataset.fs=ed.fs;
  span.addEventListener('click', e=>{if(mode==='select')openEditPopup(span,e);});
  layer.appendChild(span);
}

function cancelEdit(){
  if(activeEdit && activeEdit.span) activeEdit.span.classList.remove('editing');
  activeEdit=null;
  document.getElementById('inlineEditor').classList.remove('show');
}

function undoLast(){
  const last=edits.pop();
  if(!last) return;
  renderPage(currentPage); // re-render to undo
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.tbtn[id^="tbtn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tbtn-'+m)?.classList.add('active');
  const wrap=document.getElementById('pageWrap');
  wrap.classList.toggle('add-text-mode', m==='addtext');
}

async function applyChanges(){
  if(!edits.length){alert('No changes to apply.');return;}
  showModal('Applying changes...');
  try{
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const doc=await PDFDocument.load(new Uint8Array(originalBytes).slice(),{ignoreEncryption:true});
    const fontMap={
      'Helvetica':StandardFonts.Helvetica,
      'Times-Roman':StandardFonts.TimesRoman,
      'Courier':StandardFonts.Courier
    };

    for(const ed of edits){
      const page=doc.getPage(ed.page-1);
      const {height}=page.getSize();
      const fontKey=fontMap[ed.fontName]||StandardFonts.Helvetica;
      const font=await doc.embedFont(fontKey);
      const fs=ed.fs||14;

      if(!ed.isNew){
        // Whiteout original text area
        const tw=font.widthOfTextAtSize(ed.origText,fs);
        page.drawRectangle({x:ed.x-1,y:ed.y-2,width:tw+4,height:fs+4,color:rgb(1,1,1),opacity:1});
        // Draw new text
        const c=hexToRgb(ed.color||'#000000');
        page.drawText(ed.newText,{x:ed.x,y:ed.y,size:fs,font,color:rgb(c.r,c.g,c.b)});
      } else {
        const c=hexToRgb(ed.color||'#000000');
        page.drawText(ed.newText,{x:ed.x,y:ed.y,size:fs,font,color:rgb(c.r,c.g,c.b)});
      }
    }

    const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='edited.pdf';a.click();
    URL.revokeObjectURL(url);
    hideModal();
  }catch(e){hideModal();alert('Error: '+e.message);}
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  return{r,g,b};
}

function changePage(d){
  const n=currentPage+d;
  if(n<1||n>pdfJsDoc.numPages)return;
  cancelEdit();
  renderPage(n);
}

function changeZoom(d){
  scale=Math.max(0.5,Math.min(3,scale+d));
  document.getElementById('zoomLabel').textContent=Math.round(scale/1.5*100)+'%';
  if(pdfJsDoc)renderPage(currentPage);
}

function showModal(msg){document.getElementById('loadMsg').textContent=msg;document.getElementById('loadModal').classList.add('show');}
function hideModal(){document.getElementById('loadModal').classList.remove('show');}

// Close popup on outside click
document.addEventListener('click',e=>{
  if(!document.getElementById('inlineEditor').contains(e.target)&&!e.target.classList.contains('txt-span')){
    cancelEdit();
  }
});
// Enter key confirms
document.getElementById('inlineInput').addEventListener('keydown',e=>{
  if(e.key==='Enter')confirmEdit();
  if(e.key==='Escape')cancelEdit();
});
</script>
</body>
</html>
