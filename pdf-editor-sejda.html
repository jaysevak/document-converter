<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit PDF - PDF Master Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #e0e0e0;flex-shrink:0}
.logo{font-size:18px;font-weight:700;color:#d32f2f;display:flex;align-items:center;gap:8px}
.hbtns{display:flex;gap:8px}
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-red{background:#d32f2f;color:#fff}.btn-red:hover{background:#b71c1c}
.btn-gray{background:#f0f0f0;color:#333;border:1px solid #ddd}

#toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:8px 16px;display:none;gap:8px;align-items:center;flex-shrink:0}
#toolbar.show{display:flex}
.tbtn{padding:7px 14px;border:1px solid #ddd;border-radius:5px;background:#fff;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:5px}
.tbtn:hover{border-color:#d32f2f;background:#fff5f5}
.tbtn.active{background:#d32f2f;color:#fff;border-color:#d32f2f}
.tsep{width:1px;height:28px;background:#e0e0e0;margin:0 2px}
select.tsel{padding:6px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;background:#fff}
input[type=color].tcol{width:32px;height:32px;border:1px solid #ddd;border-radius:5px;padding:2px;cursor:pointer}

.main{flex:1;overflow:hidden;display:flex}
#uploadArea{flex:1;display:flex;align-items:center;justify-content:center}
.upload-box{background:#fff;border:3px dashed #ccc;border-radius:16px;padding:60px 50px;text-align:center;cursor:pointer;max-width:480px}
.upload-box:hover{border-color:#d32f2f;background:#fff5f5}
.upload-box i{font-size:60px;color:#d32f2f;margin-bottom:16px;display:block}
.upload-box h2{font-size:22px;color:#333;margin-bottom:8px}
.upload-box p{color:#888;font-size:14px;margin-bottom:20px}
.upload-box input{display:none}

#editorArea{flex:1;display:none;overflow:auto;padding:30px;align-items:flex-start;justify-content:center}
#editorArea.show{display:flex}

#pageWrap{position:relative;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.15);background:#fff}
#pdfCanvas{display:block}

/* TEXT OVERLAY */
#textLayer{position:absolute;top:0;left:0;pointer-events:none}
.ts{
  position:absolute;
  color:transparent;       /* hide — PDF canvas shows real text */
  white-space:pre;
  cursor:text;
  pointer-events:all;
  border-radius:2px;
  outline:none;
  line-height:1;
}
/* hover: show blue highlight so user knows it's clickable */
.ts:hover{background:rgba(66,133,244,.18);color:transparent}
/* active editing: white bg covers original, black text visible */
.ts:focus{
  color:#000 !important;
  background:#fff !important;
  outline:2px solid #d32f2f !important;
  z-index:10;
  min-width:20px;
}
/* after edit confirmed: white bg covers original text */
.ts.edited{
  color:#000;
  background:#fff;
}
/* add-text mode cursor */
#pageWrap.addmode{cursor:crosshair}

#bottomBar{background:#fff;border-top:1px solid #e0e0e0;padding:10px 20px;display:none;justify-content:space-between;align-items:center;flex-shrink:0}
#bottomBar.show{display:flex}
.page-nav,.zoom-ctrl{display:flex;align-items:center;gap:10px;font-size:14px}
.nav-btn{width:30px;height:30px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#f5f5f5}

.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.mbox{background:#fff;border-radius:12px;padding:36px;text-align:center;max-width:360px}
.mbox i{font-size:48px;margin-bottom:12px;display:block;animation:spin 1s linear infinite;color:#d32f2f}
@keyframes spin{to{transform:rotate(360deg)}}

.hint{font-size:12px;color:#888;padding:4px 12px;background:#fffde7;border-radius:4px;border:1px solid #ffe082}
</style>
</head>
<body>

<div class="header">
  <div class="logo"><i class="fas fa-file-pdf"></i> PDF Master Pro — Edit PDF</div>
  <div class="hbtns">
    <button class="btn btn-gray" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</button>
    <button class="btn btn-red" id="applyBtn" style="display:none" onclick="applyChanges()"><i class="fas fa-download"></i> Apply & Download</button>
  </div>
</div>

<div id="toolbar">
  <button class="tbtn active" id="tbtn-select" onclick="setMode('select')"><i class="fas fa-i-cursor"></i> Edit Text</button>
  <button class="tbtn" id="tbtn-addtext" onclick="setMode('addtext')"><i class="fas fa-plus"></i> Add Text</button>
  <div class="tsep"></div>
  <select class="tsel" id="fontFamily"><option>Helvetica</option><option>Times-Roman</option><option>Courier</option></select>
  <select class="tsel" id="fontSize"><option value="10">10</option><option value="12">12</option><option value="14" selected>14</option><option value="16">16</option><option value="18">18</option><option value="24">24</option><option value="32">32</option></select>
  <input type="color" class="tcol" id="fontColor" value="#000000" title="Color">
  <div class="tsep"></div>
  <button class="tbtn" onclick="undoLast()"><i class="fas fa-undo"></i> Undo</button>
  <div class="tsep"></div>
  <span class="hint" id="hintText">Click any text on the PDF to edit it directly</span>
</div>

<div class="main">
  <div id="uploadArea">
    <div class="upload-box" onclick="document.getElementById('fi').click()">
      <i class="fas fa-file-pdf"></i>
      <h2>Open PDF to Edit</h2>
      <p>Click to select a PDF file</p>
      <button class="btn btn-red" onclick="event.stopPropagation();document.getElementById('fi').click()"><i class="fas fa-folder-open"></i> Browse PDF</button>
      <input type="file" id="fi" accept=".pdf">
    </div>
  </div>
  <div id="editorArea">
    <div id="pageWrap">
      <canvas id="pdfCanvas"></canvas>
      <div id="textLayer"></div>
    </div>
  </div>
</div>

<div id="bottomBar">
  <div class="page-nav">
    <button class="nav-btn" onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
    <span>Page <b id="pgNum">1</b> of <b id="pgTotal">1</b></span>
    <button class="nav-btn" onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
  </div>
  <div class="zoom-ctrl">
    <button class="nav-btn" onclick="changeZoom(-0.25)"><i class="fas fa-minus"></i></button>
    <span id="zoomLbl">100%</span>
    <button class="nav-btn" onclick="changeZoom(0.25)"><i class="fas fa-plus"></i></button>
  </div>
</div>

<div class="modal" id="loadModal">
  <div class="mbox"><i class="fas fa-spinner"></i><h3 id="loadMsg">Loading...</h3></div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfJsDoc=null, currentPage=1, scale=1.5, mode='select';
let originalBytes=null;
// edits[page] = [{x,y,fs,origText,newText,isNew,color,fontName}]
let edits={};

document.getElementById('fi').addEventListener('change',async e=>{
  const file=e.target.files[0]; if(!file)return;
  showModal('Loading PDF...');
  const buf=await file.arrayBuffer();
  originalBytes=buf.slice(0);
  pdfJsDoc=await pdfjsLib.getDocument({data:new Uint8Array(originalBytes)}).promise;
  document.getElementById('uploadArea').style.display='none';
  document.getElementById('editorArea').classList.add('show');
  document.getElementById('toolbar').classList.add('show');
  document.getElementById('bottomBar').classList.add('show');
  document.getElementById('applyBtn').style.display='';
  document.getElementById('pgTotal').textContent=pdfJsDoc.numPages;
  await renderPage(1);
  hideModal();
});

async function renderPage(n){
  currentPage=n;
  document.getElementById('pgNum').textContent=n;
  const page=await pdfJsDoc.getPage(n);
  const vp=page.getViewport({scale});
  const canvas=document.getElementById('pdfCanvas');
  canvas.width=vp.width; canvas.height=vp.height;
  const layer=document.getElementById('textLayer');
  layer.style.width=vp.width+'px'; layer.style.height=vp.height+'px';
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  await buildTextLayer(page,vp);
}

async function buildTextLayer(page,vp){
  const layer=document.getElementById('textLayer');
  layer.innerHTML='';
  const content=await page.getTextContent();

  content.items.forEach((item,idx)=>{
    if(!item.str) return;
    const tx=item.transform;
    const x=tx[4]*scale;
    const rawY=tx[5]*scale;
    const y=vp.height - rawY;
    const fs=Math.abs(tx[3])*scale;
    const w=Math.max(item.width*scale, 4);

    const span=document.createElement('span');
    span.className='ts';
    span.contentEditable='true';
    span.spellcheck=false;
    span.textContent=item.str;
    span.style.cssText=`left:${x}px;top:${y-fs}px;font-size:${fs}px;width:${w}px;height:${fs*1.3}px`;
    span.dataset.origText=item.str;
    span.dataset.x=tx[4];
    span.dataset.y=tx[5];
    span.dataset.fs=Math.abs(tx[3]);

    // Restore any previous edit for this item
    const pageEdits=edits[currentPage]||[];
    const prev=pageEdits.find(e=>!e.isNew && Math.abs(e.x-tx[4])<1 && Math.abs(e.y-tx[5])<1);
    if(prev){
      span.textContent=prev.newText;
      span.classList.add('edited');
    }

    span.addEventListener('focus',()=>{
      if(mode!=='select'){span.blur();return;}
      // On focus: make editable, show text
      span.style.color='#000';
    });

    span.addEventListener('blur',()=>{
      const newText=span.textContent;
      const origText=span.dataset.origText;
      if(newText!==origText){
        span.classList.add('edited');
        span.dataset.origText=newText;
        if(!edits[currentPage]) edits[currentPage]=[];
        // Remove old edit for same position if exists
        edits[currentPage]=edits[currentPage].filter(e=>!(Math.abs(e.x-parseFloat(span.dataset.x))<1 && Math.abs(e.y-parseFloat(span.dataset.y))<1 && !e.isNew));
        edits[currentPage].push({
          x:parseFloat(span.dataset.x),
          y:parseFloat(span.dataset.y),
          fs:parseFloat(span.dataset.fs),
          origText,
          newText,
          isNew:false
        });
      } else if(!span.classList.contains('edited')){
        span.style.color='transparent';
      }
    });

    span.addEventListener('keydown',e=>{
      if(e.key==='Enter'){e.preventDefault();span.blur();}
      if(e.key==='Escape'){span.textContent=span.dataset.origText;span.blur();}
    });

    layer.appendChild(span);
  });

  // Re-add new text items for this page
  (edits[currentPage]||[]).filter(e=>e.isNew).forEach(ed=>addNewTextSpan(ed));

  // Click on canvas = add text
  document.getElementById('pageWrap').onclick=e=>{
    if(mode==='addtext' && (e.target===document.getElementById('pdfCanvas')||e.target===layer)){
      addTextAt(e);
    }
  };
}

function addTextAt(e){
  const wrap=document.getElementById('pageWrap');
  const rect=wrap.getBoundingClientRect();
  const cx=e.clientX-rect.left;
  const cy=e.clientY-rect.top;
  const vph=document.getElementById('pdfCanvas').height;
  const pdfX=cx/scale;
  const pdfY=(vph-cy)/scale;
  const fs=parseInt(document.getElementById('fontSize').value)||14;
  const color=document.getElementById('fontColor').value;
  const fontName=document.getElementById('fontFamily').value;
  const ed={x:pdfX,y:pdfY,fs,color,fontName,newText:'New Text',isNew:true};
  if(!edits[currentPage]) edits[currentPage]=[];
  edits[currentPage].push(ed);
  const span=addNewTextSpan(ed);
  // immediately focus for editing
  setTimeout(()=>{span.focus();document.execCommand('selectAll',false,null);},10);
}

function addNewTextSpan(ed){
  const layer=document.getElementById('textLayer');
  const vph=document.getElementById('pdfCanvas').height;
  const cx=ed.x*scale;
  const cy=vph-ed.y*scale;
  const fs=ed.fs*scale;
  const span=document.createElement('span');
  span.className='ts edited';
  span.contentEditable='true';
  span.spellcheck=false;
  span.textContent=ed.newText;
  span.style.cssText=`left:${cx}px;top:${cy-fs}px;font-size:${fs}px;color:${ed.color||'#000'};background:#fff;min-width:40px;height:${fs*1.3}px`;
  span.dataset.origText='';
  span.dataset.x=ed.x; span.dataset.y=ed.y; span.dataset.fs=ed.fs;
  span.addEventListener('blur',()=>{
    ed.newText=span.textContent;
    if(!span.textContent.trim()){
      span.remove();
      edits[currentPage]=edits[currentPage].filter(e=>e!==ed);
    }
  });
  span.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();span.blur();}});
  layer.appendChild(span);
  return span;
}

function undoLast(){
  if(!edits[currentPage]||!edits[currentPage].length) return;
  edits[currentPage].pop();
  renderPage(currentPage);
}

function setMode(m){
  mode=m;
  document.querySelectorAll('.tbtn[id^="tbtn-"]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tbtn-'+m)?.classList.add('active');
  document.getElementById('pageWrap').classList.toggle('addmode',m==='addtext');
  document.getElementById('hintText').textContent=
    m==='addtext'?'Click anywhere on the PDF to add new text':'Click any text on the PDF to edit it directly';
}

async function applyChanges(){
  const allEdits=Object.values(edits).flat();
  if(!allEdits.length){alert('No changes to apply.');return;}
  showModal('Saving PDF...');
  try{
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const doc=await PDFDocument.load(new Uint8Array(originalBytes).slice(),{ignoreEncryption:true});
    const fontMap={'Helvetica':StandardFonts.Helvetica,'Times-Roman':StandardFonts.TimesRoman,'Courier':StandardFonts.Courier};

    for(const [pg,pgEdits] of Object.entries(edits)){
      const page=doc.getPage(parseInt(pg)-1);
      const {height}=page.getSize();
      for(const ed of pgEdits){
        const fKey=fontMap[ed.fontName]||StandardFonts.Helvetica;
        const font=await doc.embedFont(fKey);
        const fs=ed.fs||14;
        if(!ed.isNew){
          // Whiteout original
          const tw=font.widthOfTextAtSize(ed.origText||ed.newText,fs)+4;
          page.drawRectangle({x:ed.x-1,y:ed.y-2,width:tw,height:fs+4,color:rgb(1,1,1)});
        }
        const c=hexRgb(ed.color||'#000000');
        page.drawText(ed.newText,{x:ed.x,y:ed.y,size:fs,font,color:rgb(c.r,c.g,c.b)});
      }
    }

    const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='edited.pdf';a.click();
    URL.revokeObjectURL(url);
    hideModal();
  }catch(e){hideModal();alert('Error: '+e.message);}
}

function hexRgb(h){return{r:parseInt(h.slice(1,3),16)/255,g:parseInt(h.slice(3,5),16)/255,b:parseInt(h.slice(5,7),16)/255};}
function changePage(d){const n=currentPage+d;if(n<1||n>pdfJsDoc.numPages)return;renderPage(n);}
function changeZoom(d){scale=Math.max(0.5,Math.min(3,scale+d));document.getElementById('zoomLbl').textContent=Math.round(scale/1.5*100)+'%';if(pdfJsDoc)renderPage(currentPage);}
function showModal(m){document.getElementById('loadMsg').textContent=m;document.getElementById('loadModal').classList.add('show');}
function hideModal(){document.getElementById('loadModal').classList.remove('show');}
</script>
</body>
</html>
