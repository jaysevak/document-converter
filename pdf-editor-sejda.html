<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit PDF - PDF Master Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f0f0;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid #e0e0e0;flex-shrink:0}
.logo{font-size:18px;font-weight:700;color:#d32f2f;display:flex;align-items:center;gap:8px}
.hbtns{display:flex;gap:8px}
.btn{padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;display:inline-flex;align-items:center;gap:6px;transition:all .2s}
.btn-red{background:#d32f2f;color:#fff}.btn-red:hover{background:#b71c1c}
.btn-gray{background:#f0f0f0;color:#333;border:1px solid #ddd}.btn-gray:hover{background:#e0e0e0}

/* TOOLBAR */
#toolbar{background:#fff;border-bottom:1px solid #e0e0e0;padding:6px 12px;display:none;gap:4px;align-items:center;flex-wrap:wrap;flex-shrink:0}
#toolbar.show{display:flex}
.tbtn{padding:6px 12px;border:1px solid #ddd;border-radius:5px;background:#fff;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:all .2s}
.tbtn:hover{border-color:#d32f2f;background:#fff5f5}
.tbtn.active{background:#d32f2f;color:#fff;border-color:#d32f2f}
.tsep{width:1px;height:26px;background:#e0e0e0;margin:0 2px;flex-shrink:0}
.tsel{padding:5px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;background:#fff;cursor:pointer}
.tcol{width:28px;height:28px;border:1px solid #ddd;border-radius:5px;padding:2px;cursor:pointer}
.tnum{width:50px;padding:5px 6px;border:1px solid #ddd;border-radius:5px;font-size:12px;text-align:center}

/* MAIN */
.main{flex:1;overflow:hidden;display:flex}
#uploadArea{flex:1;display:flex;align-items:center;justify-content:center}
.upload-box{background:#fff;border:3px dashed #ccc;border-radius:16px;padding:60px 50px;text-align:center;cursor:pointer;max-width:480px;transition:all .3s}
.upload-box:hover{border-color:#d32f2f;background:#fff5f5}
.upload-box i{font-size:60px;color:#d32f2f;margin-bottom:16px;display:block}
.upload-box h2{font-size:22px;color:#333;margin-bottom:8px}
.upload-box p{color:#888;font-size:14px;margin-bottom:20px}
.upload-box input{display:none}

#editorArea{flex:1;display:none;overflow:auto;padding:30px;align-items:flex-start;justify-content:center}
#editorArea.show{display:flex}

/* PAGE WRAP - all layers stacked */
#pageWrap{position:relative;display:inline-block;box-shadow:0 4px 24px rgba(0,0,0,.15);background:#fff;user-select:none}
#pdfCanvas{display:block;position:relative;z-index:1}
#textLayer{position:absolute;top:0;left:0;z-index:2;pointer-events:none}
#drawCanvas{position:absolute;top:0;left:0;z-index:3;pointer-events:none}
#imgDetectLayer{position:absolute;top:0;left:0;z-index:5;pointer-events:none}
.img-detect-box{position:absolute;border:2px dashed rgba(211,47,47,.5);border-radius:3px;cursor:pointer;transition:all .2s;background:rgba(211,47,47,.05)}
.img-detect-box:hover{border-color:#d32f2f;background:rgba(211,47,47,.15)}
.img-detect-box .img-del{position:absolute;top:-10px;right:-10px;width:22px;height:22px;background:#d32f2f;color:#fff;border-radius:50%;font-size:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
#hintBar{position:fixed;top:120px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:400;display:none;align-items:center;gap:10px}
#hintBar.show{display:flex}

/* Text spans */
.ts{position:absolute;color:transparent;white-space:pre;cursor:text;pointer-events:all;border-radius:2px;outline:none;line-height:1}
.ts:hover{background:rgba(66,133,244,.15)}
.ts:focus{color:#000!important;background:#fff!important;outline:2px solid #d32f2f!important;z-index:10;min-width:20px}
.ts.edited{color:#000;background:#fff}

/* Overlay elements (images, shapes placed by user) */
.ov-el{position:absolute;cursor:move;border:2px solid transparent;transition:border .15s}
.ov-el:hover{border-color:#4285f4}
.ov-el.selected{border-color:#d32f2f!important}
.ov-el .del-btn{position:absolute;top:-10px;right:-10px;width:20px;height:20px;background:#d32f2f;color:#fff;border-radius:50%;font-size:11px;display:none;align-items:center;justify-content:center;cursor:pointer;z-index:20}
.ov-el:hover .del-btn,.ov-el.selected .del-btn{display:flex}
.ov-el .resize-handle{position:absolute;bottom:-5px;right:-5px;width:12px;height:12px;background:#d32f2f;border-radius:2px;cursor:se-resize;display:none}
.ov-el:hover .resize-handle,.ov-el.selected .resize-handle{display:block}

/* Signature canvas */
#sigModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;align-items:center;justify-content:center}
#sigModal.show{display:flex}
.sig-box{background:#fff;border-radius:12px;padding:24px;text-align:center;width:500px}
.sig-box h3{margin-bottom:12px;font-size:16px}
#sigCanvas{border:2px solid #ddd;border-radius:8px;cursor:crosshair;display:block;margin:0 auto}
.sig-btns{display:flex;gap:8px;margin-top:12px;justify-content:center}

/* Bottom bar */
#bottomBar{background:#fff;border-top:1px solid #e0e0e0;padding:10px 20px;display:none;justify-content:space-between;align-items:center;flex-shrink:0}
#bottomBar.show{display:flex}
.page-nav,.zoom-ctrl{display:flex;align-items:center;gap:10px;font-size:14px}
.nav-btn{width:30px;height:30px;border:1px solid #ddd;border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
.nav-btn:hover{background:#f5f5f5}

/* Loading modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center}
.modal.show{display:flex}
.mbox{background:#fff;border-radius:12px;padding:36px;text-align:center;max-width:360px}
.mbox i{font-size:48px;margin-bottom:12px;display:block;animation:spin 1s linear infinite;color:#d32f2f}
@keyframes spin{to{transform:rotate(360deg)}}

/* Cursor modes */
#pageWrap.mode-text{cursor:text}
#pageWrap.mode-addtext{cursor:text}
#pageWrap.mode-image{cursor:copy}
#pageWrap.mode-rect,#pageWrap.mode-circle,#pageWrap.mode-line{cursor:crosshair}
#pageWrap.mode-highlight{cursor:crosshair}
#pageWrap.mode-whiteout{cursor:crosshair}
#pageWrap.mode-sign{cursor:copy}
#pageWrap.mode-select{cursor:default}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><i class="fas fa-file-pdf"></i> PDF Master Pro — Edit PDF</div>
  <div class="hbtns">
    <button class="btn btn-gray" onclick="location.href='index.html'"><i class="fas fa-arrow-left"></i> Back</button>
    <button class="btn btn-red" id="applyBtn" style="display:none" onclick="applyChanges()"><i class="fas fa-download"></i> Apply & Download</button>
  </div>
</div>

<div id="toolbar">
  <!-- Text tools -->
  <button class="tbtn active" id="tbtn-text" onclick="setMode('text')"><i class="fas fa-i-cursor"></i> Edit Text</button>
  <button class="tbtn" id="tbtn-addtext" onclick="setMode('addtext')"><i class="fas fa-font"></i> Add Text</button>
  <div class="tsep"></div>
  <!-- Image -->
  <button class="tbtn" id="tbtn-image" onclick="triggerImageUpload()"><i class="fas fa-image"></i> Add Image</button>
  <input type="file" id="imgInput" accept="image/*" style="display:none">
  <!-- Signature -->
  <button class="tbtn" id="tbtn-sign" onclick="setMode('sign')"><i class="fas fa-signature"></i> Signature</button>
  <button class="tbtn" id="tbtn-remove-img" onclick="setMode('remove-img')" title="Click on an existing image in the PDF to remove it"><i class="fas fa-image"></i> Remove Image</button>
  <div class="tsep"></div>
  <!-- Shapes -->
  <button class="tbtn" id="tbtn-rect" onclick="setMode('rect')"><i class="fas fa-square"></i> Rectangle</button>
  <button class="tbtn" id="tbtn-circle" onclick="setMode('circle')"><i class="fas fa-circle"></i> Circle</button>
  <button class="tbtn" id="tbtn-line" onclick="setMode('line')"><i class="fas fa-minus"></i> Line</button>
  <div class="tsep"></div>
  <!-- Annotate -->
  <button class="tbtn" id="tbtn-highlight" onclick="setMode('highlight')"><i class="fas fa-highlighter"></i> Highlight</button>
  <button class="tbtn" id="tbtn-whiteout" onclick="setMode('whiteout')"><i class="fas fa-eraser"></i> Whiteout</button>
  <button class="tbtn" id="tbtn-erase-img" onclick="setMode('erase-img')" title="Draw over existing images to erase them"><i class="fas fa-image"></i><i class="fas fa-times" style="font-size:9px;margin-left:-4px"></i> Erase Image</button>
  <div class="tsep"></div>
  <!-- Style -->
  <input type="color" class="tcol" id="strokeColor" value="#d32f2f" title="Color">
  <input type="number" class="tnum" id="strokeWidth" value="2" min="1" max="20" title="Size/Width">
  <select class="tsel" id="fontFamily"><option>Helvetica</option><option>Times-Roman</option><option>Courier</option></select>
  <input type="number" class="tnum" id="fontSize" value="14" min="6" max="72" title="Font size">
  <div class="tsep"></div>
  <button class="tbtn" onclick="undoLast()"><i class="fas fa-undo"></i> Undo</button>
</div>

<div class="main">
  <div id="uploadArea">
    <div class="upload-box" onclick="document.getElementById('fi').click()">
      <i class="fas fa-file-pdf"></i>
      <h2>Open PDF to Edit</h2>
      <p>Click to select a PDF file</p>
      <button class="btn btn-red" onclick="event.stopPropagation();document.getElementById('fi').click()"><i class="fas fa-folder-open"></i> Browse PDF</button>
      <input type="file" id="fi" accept=".pdf">
    </div>
  </div>
  <div id="editorArea">
    <div id="pageWrap" class="mode-text">
      <canvas id="pdfCanvas"></canvas>
      <div id="textLayer"></div>
      <canvas id="drawCanvas"></canvas>
      <div id="overlayLayer"></div>
      <div id="imgDetectLayer"></div>
    </div>
  </div>
</div>

<div id="bottomBar">
  <div class="page-nav">
    <button class="nav-btn" onclick="changePage(-1)"><i class="fas fa-chevron-left"></i></button>
    <span>Page <b id="pgNum">1</b> of <b id="pgTotal">1</b></span>
    <button class="nav-btn" onclick="changePage(1)"><i class="fas fa-chevron-right"></i></button>
  </div>
  <div class="zoom-ctrl">
    <button class="nav-btn" onclick="changeZoom(-0.25)"><i class="fas fa-minus"></i></button>
    <span id="zoomLbl">100%</span>
    <button class="nav-btn" onclick="changeZoom(0.25)"><i class="fas fa-plus"></i></button>
  </div>
</div>

<!-- Hint Bar -->
<div id="hintBar"><i class="fas fa-info-circle"></i><span id="hintMsg"></span><button class="btn btn-gray" style="padding:4px 10px;font-size:12px" onclick="cancelHintMode()">Cancel</button></div>

<!-- Signature Modal -->
<div id="sigModal">
  <div class="sig-box">
    <h3>Draw Your Signature</h3>
    <canvas id="sigCanvas" width="440" height="180"></canvas>
    <div class="sig-btns">
      <button class="btn btn-gray" onclick="clearSig()"><i class="fas fa-trash"></i> Clear</button>
      <button class="btn btn-gray" onclick="closeSigModal()">Cancel</button>
      <button class="btn btn-red" onclick="placeSig()"><i class="fas fa-check"></i> Place Signature</button>
    </div>
  </div>
</div>

<div class="modal" id="loadModal">
  <div class="mbox"><i class="fas fa-spinner"></i><h3 id="loadMsg">Loading...</h3></div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfJsDoc=null, currentPage=1, scale=1.5, mode='text';
let originalBytes=null;
// edits per page
let textEdits={};   // {page:[{x,y,fs,origText,newText,isNew,color,fontName}]}
let drawEdits={};   // {page:[{type,x1,y1,x2,y2,color,width,opacity}]}
let overlayEdits={}; // {page:[{type:'image'|'sig',x,y,w,h,dataUrl}]}

// ---- FILE LOAD ----
async function loadFile(file){
  if(!file) return;
  if(!file.name.match(/\.pdf$/i)){alert('Please select a PDF file.');return;}
  if(file.size>100*1024*1024){alert('File too large. Max 100MB.');return;}
  showModal('Loading PDF...');
  try{
    const buf=await file.arrayBuffer();
    originalBytes=buf.slice(0);
    const pdfJsCopy=buf.slice(0);
    pdfJsDoc=await pdfjsLib.getDocument({data:new Uint8Array(pdfJsCopy)}).promise;
    document.getElementById('uploadArea').style.display='none';
    document.getElementById('editorArea').classList.add('show');
    document.getElementById('toolbar').classList.add('show');
    document.getElementById('bottomBar').classList.add('show');
    document.getElementById('applyBtn').style.display='';
    document.getElementById('pgTotal').textContent=pdfJsDoc.numPages;
    try{ await renderPage(1); }catch(e){ console.error('Render error:',e); }
    hideModal();
  }catch(err){
    hideModal();
    alert('Failed to load PDF: '+(err.message||err)+'\n\nMake sure the file is a valid PDF.');
    console.error(err);
  }
}

document.getElementById('fi').addEventListener('change',e=>{
  const file=e.target.files[0];
  e.target.value=''; // reset so same file can be re-selected
  loadFile(file);
});

// Drag & drop on upload box
const uploadBox=document.querySelector('.upload-box');
uploadBox.addEventListener('dragover',e=>{e.preventDefault();uploadBox.style.borderColor='#d32f2f';uploadBox.style.background='#fff5f5';});
uploadBox.addEventListener('dragleave',()=>{uploadBox.style.borderColor='';uploadBox.style.background='';});
uploadBox.addEventListener('drop',e=>{e.preventDefault();uploadBox.style.borderColor='';uploadBox.style.background='';loadFile(e.dataTransfer.files[0]);});

// ---- RENDER ----
async function renderPage(n){
  currentPage=n;
  document.getElementById('pgNum').textContent=n;
  const page=await pdfJsDoc.getPage(n);
  const vp=page.getViewport({scale});
  const canvas=document.getElementById('pdfCanvas');
  const dc=document.getElementById('drawCanvas');
  canvas.width=vp.width; canvas.height=vp.height;
  dc.width=vp.width; dc.height=vp.height;
  document.getElementById('textLayer').style.cssText=`width:${vp.width}px;height:${vp.height}px`;
  document.getElementById('overlayLayer').style.cssText=`width:${vp.width}px;height:${vp.height}px`;
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  try{ await buildTextLayer(page,vp); }catch(e){ console.warn('Text layer skipped:',e.message); }
  try{ redrawShapes(); }catch(e){}
  try{ rebuildOverlays(); }catch(e){}
  try{ await detectPdfImages(page,vp); }catch(e){ console.warn('Image detection skipped:',e.message); }
}

// ---- TEXT LAYER ----
async function buildTextLayer(page,vp){
  const layer=document.getElementById('textLayer');
  layer.innerHTML='';
  const content=await page.getTextContent();
  content.items.forEach(item=>{
    if(!item.str) return;
    const tx=item.transform;
    const x=tx[4]*scale, rawY=tx[5]*scale, y=vp.height-rawY;
    const fs=Math.abs(tx[3])*scale, w=Math.max(item.width*scale,4);
    const span=document.createElement('span');
    span.className='ts';
    span.contentEditable='true';
    span.spellcheck=false;
    span.textContent=item.str;
    span.style.cssText=`left:${x}px;top:${y-fs}px;font-size:${fs}px;width:${w}px;height:${fs*1.3}px`;
    span.dataset.origText=item.str;
    span.dataset.x=tx[4]; span.dataset.y=tx[5]; span.dataset.fs=Math.abs(tx[3]);
    // restore prev edit
    const prev=(textEdits[currentPage]||[]).find(e=>!e.isNew&&Math.abs(e.x-tx[4])<1&&Math.abs(e.y-tx[5])<1);
    if(prev){span.textContent=prev.newText;span.classList.add('edited');}
    span.addEventListener('focus',()=>{if(mode!=='text'&&mode!=='addtext'){span.blur();}});
    span.addEventListener('blur',()=>{
      const nt=span.textContent, ot=span.dataset.origText;
      if(nt!==ot){
        span.classList.add('edited'); span.dataset.origText=nt;
        if(!textEdits[currentPage])textEdits[currentPage]=[];
        textEdits[currentPage]=textEdits[currentPage].filter(e=>!(Math.abs(e.x-parseFloat(span.dataset.x))<1&&Math.abs(e.y-parseFloat(span.dataset.y))<1&&!e.isNew));
        textEdits[currentPage].push({x:parseFloat(span.dataset.x),y:parseFloat(span.dataset.y),fs:parseFloat(span.dataset.fs),origText:ot,newText:nt,isNew:false});
      }
    });
    span.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();span.blur();}if(e.key==='Escape'){span.textContent=span.dataset.origText;span.blur();}});
    layer.appendChild(span);
  });
  // re-add new text items
  (textEdits[currentPage]||[]).filter(e=>e.isNew).forEach(ed=>addNewTextSpan(ed));
}

function addNewTextSpan(ed){
  const layer=document.getElementById('textLayer');
  const vph=document.getElementById('pdfCanvas').height;
  const cx=ed.x*scale, cy=vph-ed.y*scale, fs=ed.fs*scale;
  const span=document.createElement('span');
  span.className='ts edited'; span.contentEditable='true'; span.spellcheck=false;
  span.textContent=ed.newText;
  span.style.cssText=`left:${cx}px;top:${cy-fs}px;font-size:${fs}px;color:${ed.color||'#000'};background:#fff;min-width:40px;height:${fs*1.3}px`;
  span.dataset.origText=''; span.dataset.x=ed.x; span.dataset.y=ed.y; span.dataset.fs=ed.fs;
  span.addEventListener('blur',()=>{ed.newText=span.textContent;if(!span.textContent.trim()){span.remove();textEdits[currentPage]=textEdits[currentPage].filter(e=>e!==ed);}});
  span.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();span.blur();}});
  layer.appendChild(span);
  return span;
}

// ---- DETECT EXISTING PDF IMAGES ----
let detectedImages={}; // {page:[{x,y,w,h}]} in canvas coords
async function detectPdfImages(page,vp){
  const layer=document.getElementById('imgDetectLayer');
  layer.innerHTML='';
  layer.style.cssText=`width:${vp.width}px;height:${vp.height}px;position:absolute;top:0;left:0;z-index:5;pointer-events:${mode==='remove-img'?'all':'none'}`;
  const opList=await page.getOperatorList();
  const OPS=pdfjsLib.OPS;
  if(!OPS) return;
  // Track CTM stack
  let ctm=[1,0,0,1,0,0];
  const stack=[];
  const imgs=[];
  for(let i=0;i<opList.fnArray.length;i++){
    const fn=opList.fnArray[i];
    const args=opList.argsArray[i];
    if(fn===OPS.save){stack.push([...ctm]);}
    else if(fn===OPS.restore){if(stack.length)ctm=stack.pop();}
    else if(fn===OPS.transform){
      const [a,b,c,d,e,f]=args;
      // multiply ctm * [a,b,c,d,e,f]
      const [ca,cb,cc,cd,ce,cf]=ctm;
      ctm=[ca*a+cc*b, cb*a+cd*b, ca*c+cc*d, cb*c+cd*d, ca*e+cc*f+ce, cb*e+cd*f+cf];
    }
    else if(fn===OPS.paintImageXObject||fn===OPS.paintInlineImageXObject||fn===OPS.paintImageMaskXObject){
      // image is drawn in unit square [0,1]x[0,1] transformed by ctm
      // corners: (0,0),(1,0),(1,1),(0,1)
      const corners=[[0,0],[1,0],[1,1],[0,1]].map(([px,py])=>{
        return [ctm[0]*px+ctm[2]*py+ctm[4], ctm[1]*px+ctm[3]*py+ctm[5]];
      });
      const xs=corners.map(c=>c[0]), ys=corners.map(c=>c[1]);
      const pdfX=Math.min(...xs), pdfY=Math.min(...ys);
      const pdfW=Math.max(...xs)-pdfX, pdfH=Math.max(...ys)-pdfY;
      // convert to canvas coords
      const cx=pdfX*scale, cy=vp.height-((pdfY+pdfH)*scale);
      const cw=pdfW*scale, ch=pdfH*scale;
      if(cw>10&&ch>10) imgs.push({cx,cy,cw,ch,pdfX,pdfY,pdfW,pdfH});
    }
  }
  detectedImages[currentPage]=imgs;
  imgs.forEach((img,idx)=>{
    const box=document.createElement('div');
    box.className='img-detect-box';
    box.style.cssText=`left:${img.cx}px;top:${img.cy}px;width:${img.cw}px;height:${img.ch}px`;
    const del=document.createElement('div');
    del.className='img-del';del.textContent='✕';del.title='Remove this image';
    del.onclick=e=>{
      e.stopPropagation();
      // Add whiteout over this image
      if(!drawEdits[currentPage])drawEdits[currentPage]=[];
      drawEdits[currentPage].push({type:'whiteout',x1:img.pdfX,y1:img.pdfY,x2:img.pdfX+img.pdfW,y2:img.pdfY+img.pdfH,color:'#ffffff',width:1,opacity:1});
      redrawShapes();
      box.remove();
      showToast('Image removed. Click Apply & Download to save.');
    };
    box.appendChild(del);
    layer.appendChild(box);
  });
}

function showHint(msg){
  document.getElementById('hintMsg').textContent=msg;
  document.getElementById('hintBar').classList.add('show');
}
function hideHint(){document.getElementById('hintBar').classList.remove('show');}
function cancelHintMode(){
  hideHint();
  if(sigMarker){sigMarker.remove();sigMarker=null;}
  pendingSigPos=null;
  pendingSigDataUrl=null;
  setMode('text');
}
let drawing=false, drawStart={x:0,y:0};

function redrawShapes(){
  const dc=document.getElementById('drawCanvas');
  const ctx=dc.getContext('2d');
  ctx.clearRect(0,0,dc.width,dc.height);
  (drawEdits[currentPage]||[]).forEach(ed=>drawShape(ctx,ed));
}

function drawShape(ctx,ed){
  ctx.save();
  ctx.strokeStyle=ed.color||'#d32f2f';
  ctx.fillStyle=ed.color||'#d32f2f';
  ctx.lineWidth=ed.width||2;
  ctx.globalAlpha=ed.opacity||1;
  const x1=ed.x1*scale,y1=document.getElementById('pdfCanvas').height-ed.y1*scale;
  const x2=ed.x2*scale,y2=document.getElementById('pdfCanvas').height-ed.y2*scale;
  if(ed.type==='rect'){
    ctx.strokeRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));
  } else if(ed.type==='circle'){
    const rx=Math.abs(x2-x1)/2, ry=Math.abs(y2-y1)/2;
    ctx.beginPath(); ctx.ellipse(Math.min(x1,x2)+rx,Math.min(y1,y2)+ry,rx,ry,0,0,Math.PI*2); ctx.stroke();
  } else if(ed.type==='line'){
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  } else if(ed.type==='highlight'){
    ctx.globalAlpha=0.35;
    ctx.fillStyle=ed.color||'#ffeb3b';
    ctx.fillRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));
  } else if(ed.type==='whiteout'||ed.type==='erase-img'){
    ctx.globalAlpha=1; ctx.fillStyle='#ffffff';
    ctx.fillRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));
  }
  ctx.restore();
}

// ---- OVERLAY (images/signatures) ----
function rebuildOverlays(){
  const layer=document.getElementById('overlayLayer');
  layer.innerHTML='';
  (overlayEdits[currentPage]||[]).forEach(ed=>createOverlayEl(ed));
}

function createOverlayEl(ed){
  const layer=document.getElementById('overlayLayer');
  const vph=document.getElementById('pdfCanvas').height;
  const el=document.createElement('div');
  el.className='ov-el';
  el.style.cssText=`left:${ed.cx}px;top:${ed.cy}px;width:${ed.cw}px;height:${ed.ch}px`;
  const img=document.createElement('img');
  img.src=ed.dataUrl; img.style.cssText='width:100%;height:100%;display:block;pointer-events:none';
  el.appendChild(img);
  // delete btn
  const del=document.createElement('div');
  del.className='del-btn'; del.innerHTML='✕';
  del.onclick=e=>{e.stopPropagation();el.remove();overlayEdits[currentPage]=overlayEdits[currentPage].filter(x=>x!==ed);};
  el.appendChild(del);
  // resize handle
  const rh=document.createElement('div'); rh.className='resize-handle';
  el.appendChild(rh);
  // drag
  makeDraggable(el,ed);
  makeResizable(el,ed,rh);
  layer.appendChild(el);
  return el;
}

function makeDraggable(el,ed){
  let ox,oy,sx,sy;
  el.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('resize-handle')||e.target.classList.contains('del-btn'))return;
    e.preventDefault(); e.stopPropagation();
    el.classList.add('selected');
    ox=e.clientX; oy=e.clientY; sx=ed.cx; sy=ed.cy;
    const mm=ev=>{ed.cx=sx+(ev.clientX-ox);ed.cy=sy+(ev.clientY-oy);el.style.left=ed.cx+'px';el.style.top=ed.cy+'px';};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });
}

function makeResizable(el,ed,handle){
  let ox,oy,sw,sh;
  handle.addEventListener('mousedown',e=>{
    e.preventDefault(); e.stopPropagation();
    ox=e.clientX; oy=e.clientY; sw=ed.cw; sh=ed.ch;
    const mm=ev=>{ed.cw=Math.max(20,sw+(ev.clientX-ox));ed.ch=Math.max(20,sh+(ev.clientY-oy));el.style.width=ed.cw+'px';el.style.height=ed.ch+'px';};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu);
  });
}

// ---- CANVAS MOUSE EVENTS (shapes) ----
const pageWrap=document.getElementById('pageWrap');
let previewShape=null;

pageWrap.addEventListener('mousedown',e=>{
  if(!['rect','circle','line','highlight','whiteout','erase-img'].includes(mode))return;
  if(e.target!==document.getElementById('pdfCanvas')&&e.target!==document.getElementById('drawCanvas'))return;
  e.preventDefault();
  const r=document.getElementById('pdfCanvas').getBoundingClientRect();
  const vph=document.getElementById('pdfCanvas').height;
  drawStart={x:(e.clientX-r.left)/scale, y:(vph-(e.clientY-r.top))/scale};
  drawing=true;
});

document.addEventListener('mousemove',e=>{
  if(!drawing)return;
  const r=document.getElementById('pdfCanvas').getBoundingClientRect();
  const vph=document.getElementById('pdfCanvas').height;
  const cx=(e.clientX-r.left)/scale, cy=(vph-(e.clientY-r.top))/scale;
  const dc=document.getElementById('drawCanvas');
  const ctx=dc.getContext('2d');
  ctx.clearRect(0,0,dc.width,dc.height);
  (drawEdits[currentPage]||[]).forEach(ed=>drawShape(ctx,ed));
  // preview
  const color=document.getElementById('strokeColor').value;
  const width=parseInt(document.getElementById('strokeWidth').value)||2;
  drawShape(ctx,{type:mode,x1:drawStart.x,y1:drawStart.y,x2:cx,y2:cy,color,width,opacity:mode==='highlight'?0.35:1});
});

document.addEventListener('mouseup',e=>{
  if(!drawing)return;
  drawing=false;
  const r=document.getElementById('pdfCanvas').getBoundingClientRect();
  const vph=document.getElementById('pdfCanvas').height;
  const cx=(e.clientX-r.left)/scale, cy=(vph-(e.clientY-r.top))/scale;
  if(Math.abs(cx-drawStart.x)<3&&Math.abs(cy-drawStart.y)<3)return;
  const color=document.getElementById('strokeColor').value;
  const width=parseInt(document.getElementById('strokeWidth').value)||2;
  if(!drawEdits[currentPage])drawEdits[currentPage]=[];
  drawEdits[currentPage].push({type:mode,x1:drawStart.x,y1:drawStart.y,x2:cx,y2:cy,color,width,opacity:mode==='highlight'?0.35:1});
  redrawShapes();
});

// Click to add text OR place signature — unified handler on pageWrap
pageWrap.addEventListener('click',e=>{
  // Don't fire if clicking on overlay elements or buttons
  if(e.target.closest('.ov-el')||e.target.closest('.img-detect-box')||e.target.closest('.ts')) return;

  const r=document.getElementById('pdfCanvas').getBoundingClientRect();
  const cx=e.clientX-r.left, cy=e.clientY-r.top;

  if(mode==='sign'){
    // Store position, show marker, open draw modal
    pendingSigPos={cx,cy};
    // Show red crosshair marker at click position
    if(sigMarker) sigMarker.remove();
    sigMarker=document.createElement('div');
    sigMarker.style.cssText=`position:absolute;left:${cx-10}px;top:${cy-10}px;width:20px;height:20px;border:2px solid #d32f2f;border-radius:50%;background:rgba(211,47,47,.2);z-index:20;pointer-events:none`;
    pageWrap.appendChild(sigMarker);
    openSigModal();
    return;
  }

  if(mode==='addtext'){
    const vph=document.getElementById('pdfCanvas').height;
    const pdfX=cx/scale, pdfY=(vph-cy)/scale;
    const fs=parseInt(document.getElementById('fontSize').value)||14;
    const color=document.getElementById('strokeColor').value;
    const fontName=document.getElementById('fontFamily').value;
    const ed={x:pdfX,y:pdfY,fs,color,fontName,newText:'Text',isNew:true};
    if(!textEdits[currentPage])textEdits[currentPage]=[];
    textEdits[currentPage].push(ed);
    const span=addNewTextSpan(ed);
    setTimeout(()=>{span.focus();document.execCommand('selectAll',false,null);},10);
  }
});

// ---- IMAGE UPLOAD ----
function triggerImageUpload(){
  document.getElementById('imgInput').click();
}
document.getElementById('imgInput').addEventListener('change',e=>{
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const dataUrl=ev.target.result;
    const vph=document.getElementById('pdfCanvas').height;
    const vpw=document.getElementById('pdfCanvas').width;
    const ed={type:'image',dataUrl,cx:vpw/2-75,cy:vph/2-75,cw:150,ch:150,
      x:(vpw/2-75)/scale, y:(vph-(vph/2+75))/scale, w:150/scale, h:150/scale};
    if(!overlayEdits[currentPage])overlayEdits[currentPage]=[];
    overlayEdits[currentPage].push(ed);
    createOverlayEl(ed);
  };
  reader.readAsDataURL(file);
  e.target.value='';
});

// ---- SIGNATURE ----
let sigDrawing=false, sigCtx=null;
// ---- SIGNATURE: click spot first, then draw ----
let pendingSigPos=null;
let pendingSigDataUrl=null;
let sigMarker=null;

function openSigModal(){
  document.getElementById('sigModal').classList.add('show');
  const c=document.getElementById('sigCanvas');
  const ctx=c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  sigCtx=ctx;
  sigCtx.strokeStyle='#000'; sigCtx.lineWidth=2; sigCtx.lineCap='round';
  c.onmousedown=e=>{sigDrawing=true;sigCtx.beginPath();const r=c.getBoundingClientRect();sigCtx.moveTo(e.clientX-r.left,e.clientY-r.top);};
  c.onmousemove=e=>{if(!sigDrawing)return;const r=c.getBoundingClientRect();sigCtx.lineTo(e.clientX-r.left,e.clientY-r.top);sigCtx.stroke();};
  c.onmouseup=()=>sigDrawing=false; c.onmouseleave=()=>sigDrawing=false;
  c.ontouchstart=e=>{e.preventDefault();sigDrawing=true;sigCtx.beginPath();const r=c.getBoundingClientRect();const t=e.touches[0];sigCtx.moveTo(t.clientX-r.left,t.clientY-r.top);};
  c.ontouchmove=e=>{e.preventDefault();if(!sigDrawing)return;const r=c.getBoundingClientRect();const t=e.touches[0];sigCtx.lineTo(t.clientX-r.left,t.clientY-r.top);sigCtx.stroke();};
  c.ontouchend=()=>sigDrawing=false;
}
function clearSig(){const c=document.getElementById('sigCanvas');sigCtx.clearRect(0,0,c.width,c.height);}
function closeSigModal(){document.getElementById('sigModal').classList.remove('show');}
function placeSig(){
  const c=document.getElementById('sigCanvas');
  const blank=document.createElement('canvas');blank.width=c.width;blank.height=c.height;
  if(c.toDataURL()===blank.toDataURL()){alert('Please draw your signature first.');return;}
  const dataUrl=c.toDataURL('image/png');
  closeSigModal();
  // Remove marker
  if(sigMarker){sigMarker.remove();sigMarker=null;}
  if(pendingSigPos){
    const ed={type:'sig',dataUrl,cx:pendingSigPos.cx-100,cy:pendingSigPos.cy-40,cw:200,ch:80};
    if(!overlayEdits[currentPage])overlayEdits[currentPage]=[];
    overlayEdits[currentPage].push(ed);
    createOverlayEl(ed);
    pendingSigPos=null;
  }
  setMode('text');
  hideHint();
}
  c.onmousedown=e=>{sigDrawing=true;sigCtx.beginPath();const r=c.getBoundingClientRect();sigCtx.moveTo(e.clientX-r.left,e.clientY-r.top);};
  c.onmousemove=e=>{if(!sigDrawing)return;const r=c.getBoundingClientRect();sigCtx.lineTo(e.clientX-r.left,e.clientY-r.top);sigCtx.stroke();};
  c.onmouseup=()=>sigDrawing=false; c.onmouseleave=()=>sigDrawing=false;
  c.ontouchstart=e=>{e.preventDefault();sigDrawing=true;sigCtx.beginPath();const r=c.getBoundingClientRect();const t=e.touches[0];sigCtx.moveTo(t.clientX-r.left,t.clientY-r.top);};
  c.ontouchmove=e=>{e.preventDefault();if(!sigDrawing)return;const r=c.getBoundingClientRect();const t=e.touches[0];sigCtx.lineTo(t.clientX-r.left,t.clientY-r.top);sigCtx.stroke();};
  c.ontouchend=()=>sigDrawing=false;
}
function clearSig(){const c=document.getElementById('sigCanvas');sigCtx.clearRect(0,0,c.width,c.height);}
function closeSigModal(){document.getElementById('sigModal').classList.remove('show');}
function placeSig(){
  const c=document.getElementById('sigCanvas');
  const blank=document.createElement('canvas');blank.width=c.width;blank.height=c.height;
  if(c.toDataURL()===blank.toDataURL()){alert('Please draw your signature first.');return;}
  const dataUrl=c.toDataURL('image/png');
  closeSigModal();
  if(pendingSigPos){
    // Position was already chosen before opening modal
    const ed={type:'sig',dataUrl,cx:pendingSigPos.cx-100,cy:pendingSigPos.cy-40,cw:200,ch:80};
    if(!overlayEdits[currentPage])overlayEdits[currentPage]=[];
    overlayEdits[currentPage].push(ed);
    createOverlayEl(ed);
    pendingSigPos=null;
    setMode('text');
  } else {
    // Fallback: click to place
    pendingSigDataUrl=dataUrl;
    setMode('place-sig');
    showHint('Now click on the PDF where you want to place your signature');
  }
}

// ---- UNDO ----
function undoLast(){
  // Try draw edits first, then text, then overlay
  if(drawEdits[currentPage]&&drawEdits[currentPage].length){drawEdits[currentPage].pop();redrawShapes();return;}
  if(overlayEdits[currentPage]&&overlayEdits[currentPage].length){overlayEdits[currentPage].pop();rebuildOverlays();return;}
  if(textEdits[currentPage]&&textEdits[currentPage].length){textEdits[currentPage].pop();renderPage(currentPage);}
}

// ---- MODE ----
function setMode(m){
  mode=m;
  document.querySelectorAll('.tbtn[id^="tbtn-"]').forEach(b=>b.classList.remove('active'));
  const btn=document.getElementById('tbtn-'+m);
  if(btn)btn.classList.add('active');
  const cursorMap={'text':'text','addtext':'text','image':'copy','rect':'crosshair','circle':'crosshair','line':'crosshair','highlight':'crosshair','whiteout':'crosshair','erase-img':'crosshair','sign':'crosshair','remove-img':'default','select':'default'};
  pageWrap.style.cursor=cursorMap[m]||'default';
  const textModes=['text','addtext'];
  document.querySelectorAll('.ts').forEach(s=>s.style.pointerEvents=textModes.includes(m)?'all':'none');
  // toggle image detect layer
  const idl=document.getElementById('imgDetectLayer');
  if(idl) idl.style.pointerEvents=(m==='remove-img')?'all':'none';
  // show hint for sign mode
  if(m==='sign') showHint('Click on the PDF where you want to place your signature, then draw it');
  else if(m!=='place-sig') hideHint();
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 20px;border-radius:8px;font-size:14px;z-index:600;transition:opacity .3s';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';
  clearTimeout(t._t);t._t=setTimeout(()=>t.style.opacity='0',3000);
}

// ---- APPLY & DOWNLOAD ----
async function applyChanges(){
  const hasEdits=Object.values(textEdits).flat().length||Object.values(drawEdits).flat().length||Object.values(overlayEdits).flat().length;
  if(!hasEdits){alert('No changes to apply.');return;}
  showModal('Saving PDF...');
  try{
    const {PDFDocument,rgb,StandardFonts}=PDFLib;
    const doc=await PDFDocument.load(new Uint8Array(originalBytes.slice(0)),{ignoreEncryption:true});
    const fontMap={'Helvetica':StandardFonts.Helvetica,'Times-Roman':StandardFonts.TimesRoman,'Courier':StandardFonts.Courier};

    for(let pg=1;pg<=doc.getPageCount();pg++){
      const page=doc.getPage(pg-1);
      const {width,height}=page.getSize();

      // TEXT EDITS
      for(const ed of (textEdits[pg]||[])){
        const font=await doc.embedFont(fontMap[ed.fontName]||StandardFonts.Helvetica);
        const fs=ed.fs||14;
        if(!ed.isNew){
          const tw=font.widthOfTextAtSize(ed.origText||ed.newText,fs)+4;
          page.drawRectangle({x:ed.x-1,y:ed.y-2,width:tw,height:fs+4,color:rgb(1,1,1)});
        }
        const c=hexRgb(ed.color||'#000000');
        page.drawText(ed.newText,{x:ed.x,y:ed.y,size:fs,font,color:rgb(c.r,c.g,c.b)});
      }

      // DRAW EDITS (shapes/highlight/whiteout)
      for(const ed of (drawEdits[pg]||[])){
        const c=hexRgb(ed.color||'#000000');
        const col=rgb(c.r,c.g,c.b);
        const x1=ed.x1,y1=ed.y1,x2=ed.x2,y2=ed.y2;
        const lw=ed.width||2;
        if(ed.type==='rect'){
          page.drawRectangle({x:Math.min(x1,x2),y:Math.min(y1,y2),width:Math.abs(x2-x1),height:Math.abs(y2-y1),borderColor:col,borderWidth:lw,opacity:0,borderOpacity:1});
        } else if(ed.type==='circle'){
          page.drawEllipse({x:(x1+x2)/2,y:(y1+y2)/2,xScale:Math.abs(x2-x1)/2,yScale:Math.abs(y2-y1)/2,borderColor:col,borderWidth:lw,opacity:0,borderOpacity:1});
        } else if(ed.type==='line'){
          page.drawLine({start:{x:x1,y:y1},end:{x:x2,y:y2},color:col,thickness:lw});
        } else if(ed.type==='highlight'){
          const hc=hexRgb(ed.color||'#ffeb3b');
          page.drawRectangle({x:Math.min(x1,x2),y:Math.min(y1,y2),width:Math.abs(x2-x1),height:Math.abs(y2-y1),color:rgb(hc.r,hc.g,hc.b),opacity:0.35});
        } else if(ed.type==='whiteout'||ed.type==='erase-img'){
          page.drawRectangle({x:Math.min(x1,x2),y:Math.min(y1,y2),width:Math.abs(x2-x1),height:Math.abs(y2-y1),color:rgb(1,1,1),opacity:1});
        }
      }

      // OVERLAY EDITS (images/signatures)
      for(const ed of (overlayEdits[pg]||[])){
        const imgBytes=await fetch(ed.dataUrl).then(r=>r.arrayBuffer());
        let embImg;
        try{embImg=await doc.embedPng(imgBytes);}catch{try{embImg=await doc.embedJpg(imgBytes);}catch{continue;}}
        const ix=ed.cx/scale;
        const iy=height-(ed.cy/scale)-(ed.ch/scale);
        page.drawImage(embImg,{x:ix,y:iy,width:ed.cw/scale,height:ed.ch/scale});
      }
    }

    const bytes=await doc.save();
    const blob=new Blob([bytes],{type:'application/pdf'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='edited.pdf';a.click();
    URL.revokeObjectURL(url);
    hideModal();
  }catch(e){hideModal();alert('Error: '+e.message);console.error(e);}
}

function hexRgb(h){return{r:parseInt(h.slice(1,3),16)/255,g:parseInt(h.slice(3,5),16)/255,b:parseInt(h.slice(5,7),16)/255};}
function changePage(d){const n=currentPage+d;if(n<1||n>pdfJsDoc.numPages)return;renderPage(n);}
function changeZoom(d){scale=Math.max(0.5,Math.min(3,scale+d));document.getElementById('zoomLbl').textContent=Math.round(scale/1.5*100)+'%';if(pdfJsDoc)renderPage(currentPage);}
function showModal(m){document.getElementById('loadMsg').textContent=m;document.getElementById('loadModal').classList.add('show');}
function hideModal(){document.getElementById('loadModal').classList.remove('show');}

// Deselect overlays on outside click
document.addEventListener('click',e=>{if(!e.target.closest('.ov-el'))document.querySelectorAll('.ov-el').forEach(el=>el.classList.remove('selected'));});
</script>
